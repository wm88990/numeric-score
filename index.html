<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简谱渲染器 - 小赞</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0ebe3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    .header {
      position: sticky; top: 0;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .header .title-area { display: flex; align-items: baseline; gap: 12px; }
    .header h1 { font-size: 18px; color: #333; }
    .header .subtitle { font-size: 13px; color: #999; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .controls button {
      width: 34px; height: 34px;
      border: 1px solid #ddd; background: #fff;
      border-radius: 6px; cursor: pointer;
      font-size: 16px; color: #555;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .controls button:hover { background: #f5f5f5; border-color: #bbb; }
    .controls .zoom-level {
      font-size: 13px; color: #666;
      min-width: 50px; text-align: center;
    }
    .score-wrap {
      padding: 24px;
      display: flex; justify-content: center;
      overflow: auto;
    }
    .score-container {
      transform-origin: top center;
      transition: transform 0.2s;
    }
    .footer {
      text-align: center; padding: 20px;
      font-size: 13px; color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title-area">
      <h1>简谱渲染器</h1>
      <span class="subtitle">Jianpu SVG Renderer · v0.1</span>
    </div>
    <div class="controls">
      <button id="zoom-out" title="缩小">−</button>
      <span class="zoom-level" id="zoom-level">100%</span>
      <button id="zoom-in" title="放大">+</button>
      <button id="zoom-reset" title="重置">⟲</button>
      <button id="download" title="下载 SVG">⬇</button>
    </div>
  </div>
  <div class="score-wrap">
    <div class="score-container" id="score-container"></div>
  </div>
  <div class="footer">基于 TypeScript + SVG 自主开发 · 适用于数字简谱渲染</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
